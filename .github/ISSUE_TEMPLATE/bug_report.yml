name: 🐛 Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      options:
        - Dashboard
        - Assessment / Checklist
        - Document Analyzer (RAG)
        - AI Advisor
        - EU AI Act Compliance
        - Gap Simulator
        - Research Agent
        - Framework Builder
        - Roadmap
        - Executive Report
        - Meta Strategy
        - API / Backend
        - Other

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, Python/Node version
      placeholder: "e.g. Chrome 120, Windows 11, Python 3.12"

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: Paste any relevant error output or console logs
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Add any screenshots that help explain the problem
